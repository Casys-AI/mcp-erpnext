name: Bug Report
description: Report a bug in mcp-erpnext
title: "[Bug]: "
labels: [bug]
body:
  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-flight checklist
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true

  - type: textarea
    id: what_happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
      placeholder: Describe what went wrong.
    validations:
      required: true

  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reliably trigger the issue.
      placeholder: |
        1. Configure the MCP server with …
        2. Call tool `erpnext_…` with …
        3. Observe …
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: dropdown
    id: mcp_client
    attributes:
      label: MCP client
      description: Which MCP client are you using?
      options:
        - Claude Desktop
        - Claude Code
        - VS Code Copilot
        - Other
    validations:
      required: true

  - type: dropdown
    id: deployment
    attributes:
      label: ERPNext deployment
      description: How is your ERPNext instance hosted?
      options:
        - Self-hosted ERPNext
        - ERPNext Cloud
    validations:
      required: true

  - type: input
    id: package_version
    attributes:
      label: Package version
      description: The version pinned in your MCP client config, or the output of `npm list @casys/mcp-erpnext`.
      placeholder: "e.g. 2.3.0"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any relevant error output or MCP server logs here.
      render: shell
