# ~/mcp-erpnext/docker-compose.yml
services:
  mcp-erpnext:
    build: .
    container_name: mcp-erpnext
    restart: unless-stopped
    ports:
      - "7654:7654"        # exposes on host:7654 for nginx/direct access
    env_file: .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7654/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - librechat_default      # JOIN LibreChat's network so it can reach this by name

networks:
  librechat_default:
    external: true         # reference existing network — see Step 4
